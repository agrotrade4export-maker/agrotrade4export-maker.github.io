    <line x1="1180" y1="330" x2="900" y2="200" stroke="#2C4E82" stroke-width="1.3"/>
    <line x1="1180" y1="330" x2="1430" y2="180" stroke="#2C4E82" stroke-width="1.3"/>
    <line x1="1180" y1="330" x2="1470" y2="400" stroke="#2C4E82" stroke-width="1.3"/>
