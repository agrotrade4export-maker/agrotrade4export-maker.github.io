    <line x1="900" y1="760" x2="900" y2="430"/>
    <line x1="700" y1="440" x2="960" y2="440"/>
    <line x1="700" y1="440" x2="620" y2="470"/>
    <line x1="960" y1="440" x2="1040" y2="470"/>
    <line x1="800" y1="440" x2="800" y2="560"/>
    <line x1="778" y1="560" x2="822" y2="560"/>
    <line x1="778" y1="560" x2="778" y2="600"/>
    <line x1="822" y1="560" x2="822" y2="600"/>
    <line x1="778" y1="600" x2="822" y2="600"/>
