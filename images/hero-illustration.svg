  </defs>

  <rect width="1600" height="1000" fill="#0A2342"/>

  <!-- chart grid -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <path d="M0 64H1600M0 128H1600M0 192H1600M0 256H1600M0 320H1600M0 384H1600M0 448H1600M0 512H1600M0 576H1600M0 640H1600M0 704H1600M0 768H1600M0 832H1600M0 896H1600M0 960H1600"/>
    <path d="M64 0V1000M128 0V1000M192 0V1000M256 0V1000M320 0V1000M384 0V1000M448 0V1000M512 0V1000M576 0V1000M640 0V1000M704 0V1000M768 0V1000M832 0V1000M896 0V1000M960 0V1000M1024 0V1000M1088 0V1000M1152 0V1000M1216 0V1000M1280 0V1000M1344 0V1000M1408 0V1000M1472 0V1000M1536 0V1000"/>
  </g>

  <!-- horizon and water -->
  <line x1="0" y1="760" x2="1600" y2="760" stroke="#22406C" stroke-width="1.5"/>
  <line x1="0" y1="800" x2="1600" y2="800" stroke="#1B355E" stroke-width="1"/>
  <line x1="0" y1="840" x2="1600" y2="840" stroke="#1B355E" stroke-width="1"/>
  <line x1="0" y1="880" x2="1600" y2="880" stroke="#1B355E" stroke-width="1"/>
  <line x1="0" y1="920" x2="1600" y2="920" stroke="#1B355E" stroke-width="1"/>

  <!-- cargo ship -->
  <g stroke="#3E699F" stroke-width="2" fill="none" opacity="0.85">
