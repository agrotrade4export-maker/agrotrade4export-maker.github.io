    <rect x="1040" y="640" width="70" height="60"/>
    <rect x="1120" y="655" width="55" height="45"/>
    <rect x="1190" y="640" width="90" height="60"/>
    <rect x="1300" y="655" width="60" height="45"/>
    <rect x="1050" y="600" width="30" height="40"/>
    <line x1="1065" y1="600" x2="1065" y2="560"/>
    <line x1="1050" y1="562" x2="1082" y2="562"/>
  </g>
  <g fill="none" stroke="#5A85C2" stroke-width="1.5" opacity="0.9">
    <rect x="1195" y="612" width="42" height="28"/>
    <rect x="1240" y="612" width="42" height="28"/>
    <rect x="1195" y="584" width="42" height="26"/>
    <rect x="1305" y="618" width="42" height="22"/>
