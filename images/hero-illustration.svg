    <circle cx="900" cy="200" r="3.5" fill="#5A85C2"/>
    <circle cx="1430" cy="180" r="3.5" fill="#5A85C2"/>
    <circle cx="1470" cy="400" r="3.5" fill="#5A85C2"/>
    <circle cx="980" cy="440" r="3.5" fill="#5A85C2"/>
    <circle cx="1280" cy="470" r="3.5" fill="#5A85C2"/>
