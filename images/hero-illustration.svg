  <path d="M120 300 Q 500 120 1500 260" fill="none" stroke="#2C4E82" stroke-width="1.5" stroke-dasharray="3 10"/>
  <g transform="translate(490,148) rotate(-8)" stroke="#5A85C2" stroke-width="2" fill="none">
