<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="heroFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A2342" stop-opacity="1"/>
      <stop offset="55%" stop-color="#0A2342" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0A2342" stop-opacity="0"/>
